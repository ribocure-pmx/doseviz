<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 20 900 560" width="900" height="560">
    <defs>
        <marker id="arrow" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0,-5 L 10,0 L 0,5 Z" fill="#4B5563"/>
        </marker>
        <marker id="inhibit-eff" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 8,-6 L 8,6" stroke="#B91C1C" stroke-width="2.5" fill="none"/>
        </marker>
        <marker id="inhibit-saf" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 8,-6 L 8,6" stroke="#B91C1C" stroke-width="2.5" fill="none"/>
        </marker>
        <marker id="activateArrow" viewBox="0 -5 10 10" refX="8" refY="0" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M 0,-5 L 10,0 L 0,5 Z" fill="#047857"/>
        </marker>
        <style>
            .box-text { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #111827; }
            .sub-text { font-family: sans-serif; font-size: 14px; fill: #4B5563; }
        </style>
    </defs>

    <rect x="0" y="20" width="100%" height="100%" fill="#ffffff" />

    <path d="M 210,110 L 315,110" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)" />
    <text x="262" y="100" text-anchor="middle" class="box-text">ka</text>

    <path d="M 510,110 L 615,110" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)" />
    <text x="562" y="100" text-anchor="middle" class="box-text">ke</text>

    <circle cx="50" cy="310" r="5" fill="#4B5563" />
    <path d="M 50,310 L 140,310" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)" />
    <text x="95" y="295" text-anchor="middle" class="box-text">kin</text>
    
    <circle cx="430" cy="310" r="5" fill="#4B5563" />
    <path d="M 330,310 L 420,310" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)" />
    <text x="375" y="295" text-anchor="middle" class="box-text">kout</text>

    <circle cx="680" cy="200" r="5" fill="#4B5563" />
    <path d="M 680,200 L 680,270" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)" />
    <text x="720" y="240" text-anchor="middle" class="box-text">kin_s</text>

    <circle cx="680" cy="460" r="5" fill="#4B5563" />
    <path d="M 680,340 L 680,450" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)" />
    <text x="740" y="400" text-anchor="middle" class="box-text">kout_safety</text>

    <path d="M 360,140 C 360,220 95,200 95,300" fill="none" stroke="#B91C1C" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#inhibit-eff)" />
    <text x="210" y="225" text-anchor="middle" class="box-text" fill="#B91C1C">Emax Inhibition</text>

    <path d="M 480,140 C 480,260 560,395 670,395" fill="none" stroke="#B91C1C" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#inhibit-saf)" />
    <text x="560" y="280" class="box-text" fill="#B91C1C">Sigmoidal Inhibition</text>

    <path d="M 240,340 L 240,470" fill="none" stroke="#047857" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#activateArrow)" />
    <text x="250" y="415" class="box-text" fill="#047857">Delay</text>

    <rect x="50" y="80" width="160" height="60" rx="8" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2" />
    <text x="130" y="116" text-anchor="middle" class="box-text">Absorption Depot</text>

    <rect x="330" y="80" width="180" height="60" rx="8" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="2" />
    <text x="420" y="116" text-anchor="middle" class="box-text">Central Compartment</text>

    <rect x="150" y="280" width="180" height="60" rx="8" fill="#D1FAE5" stroke="#047857" stroke-width="2" />
    <text x="240" y="316" text-anchor="middle" class="box-text">Efficacy Biomarker</text>

    <rect x="150" y="480" width="180" height="60" rx="8" fill="#D1FAE5" stroke="#047857" stroke-width="2" />
